<script>
async function cargarCategoriasMenu() {
    const resp = await fetch("php/obtener_categorias.php");
    const data = await resp.json();

    const lista = document.getElementById("submenu-categorias");
    lista.innerHTML = "";

    data.categorias.forEach(cat => {
        lista.innerHTML += `
            <li><a href="buscar.html?categoria=${cat.id_categoria}">
                ${cat.nombre}
            </a></li>`;
    });
}

cargarCategoriasMenu();
</script>
