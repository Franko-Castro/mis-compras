<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="carrito diseño.css" />
  <link rel="stylesheet" href="estilos.css" />
</head>

<body>

  <div id="contenedor-navegacion">
    <!-- Barra de navegación copiada -->
    <script src="cargar-componentes.js"></script>
  </div>
  <div class="carrito-backdrop"></div>
  <script src="cargar-componentes.js"></script>

  <!-- ...encabezado y nav... -->
  <section class="carrito-container">
    <h1 class="titulo-carrito">Tu Carrito de Compras</h1>

    <div class="carrito-lista">
      <!-- Aquí carrito.js inyectará los items -->
    </div>

    <div class="carrito-total">
      <p>Total: <span>$0.00</span></p>
      <button class="carrito-btn">Finalizar Compra</button>
    </div>
  </section>

  <script src="carrito.js"></script>
</body>

</html>
