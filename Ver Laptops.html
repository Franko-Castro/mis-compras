<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiendaOnline - Inicio</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <!-- Aquí se carga la navegación -->
    <div id="contenedor-navegacion"></div>
    <script src="carrito.js"></script>
    <!-- Contenido principal de la página -->
    <main class="contenido-principal">
        <div class="contenedor-ancho">
            <section class="seccion-bienvenida">
                <h1>Bienvenido a TiendaOnline</h1>
                <p>Los mejores productos de tecnología</p>
                <div class="botones-principales">
                    <a href="Ver Smartphones.html" class="boton boton-azul">Ver Smartphones</a>
                    <a href="Ver Smartphones.html" class="boton boton-rojo">Ver Laptops</a>
                </div>


                <section class="seccion-productos">
                    <h2>Productos Destacados</h2>
                    <div class="grilla-productos">
                        <div class="tarjeta-producto">
                            <img src="images.jpg" alt="MacBook">
                            <h3>MacBook Pro M3</h3>
                            <p class="precio-destacado">$1599</p>
                            <a href="producto2.html" class="boton-pequeno">Ver más</a>
                        </div>
                        <div class="tarjeta-producto">
                            <img src="imagen3.jpg" alt="iMac">
                            <h3>iMac</h3>
                            <p class="precio-destacado">$2500</p>
                            <a href="producto3.html" class="boton-pequeno">Ver más</a>
                        </div>
                        <div class="tarjeta-producto">
                            <img src="imagen 5.jpg" alt="iMac mini">
                            <h3>iMac mini</h3>
                            <p class="precio-destacado">$1500</p>
                            <a href="producto1.html" class="boton-pequeno">Ver más</a>
                        </div>
                </section>
        </div>
    </main>

    <!-- Aquí se carga el pie de página -->
    <div id="contenedor-pie"></div>

    <script src="cargar-componentes.js"></script>
</body>

</html>
